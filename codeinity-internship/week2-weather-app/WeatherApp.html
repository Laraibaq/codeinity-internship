<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <meta name="description"
        content="A stunning glassmorphism weather app with real-time forecasts, sunrise/sunset data, and dynamic sky backgrounds.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="weathercss.css">
</head>

<body>

    <div class="bg-overlay"></div>
    <div class="page-wrapper">
        <div class="search-floating" id="searchFloating">
            <div class="search-input-group">
                <span class="search-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.2">
                        <circle cx="11" cy="11" r="7" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
                <input type="text" id="cityInput" placeholder="Search for a city…" autocomplete="off">
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="geoBtn" title="Use my location" class="geo-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.2">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
                        <circle cx="12" cy="12" r="9" stroke-dasharray="4 2" />
                    </svg>
                </button>
            </div>
            <div class="unit-toggle">
                <button id="unitC" class="unit-btn active">°C</button>
                <button id="unitF" class="unit-btn">°F</button>
            </div>
        </div>

        <div class="recent-bar hidden" id="recentSearchesBox">
            <span class="recent-label">Recents:</span>
            <span id="recentTags" class="recent-tags"></span>
        </div>


        <div class="error-pill hidden" id="errorMsg">
            <span>⚠️</span>
            <span id="errorText">City not found. Please try again.</span>
        </div>

        
        <div class="loading-state" id="loadingMsg">
            <div class="spinner"></div>
            <span>Fetching atmospheric data…</span>
        </div>

       
        <div class="glass-card hidden" id="weatherContent">

          
            <div class="card-header">
                <span id="weatherEmoji" class="weather-icon-large">☀️</span>
                <div class="header-info">
                    <p id="weatherDate" class="header-datetime">Tuesday, 11:56 AM</p>
                    <h1 class="header-condition-temp">
                        <span id="weatherCondition">Clear Sky</span>&nbsp;
                        <span class="temp-inline"><span id="tempValue">16</span><span
                                id="tempUnitSymbol">°C</span></span>
                    </h1>
                    <p id="locationName" class="header-city">London, GB</p>
                </div>
                
                <div class="hl-badges">
                    <span class="hl-badge high" id="highBadge">H: 18°</span>
                    <span class="hl-badge low" id="lowBadge">L: 10°</span>
                </div>
            </div>

            <div class="card-divider"></div>

           
            <div class="sun-pill" id="sunriseSunsetBar">
                <span class="sun-pill-side">
                    <span class="sun-emoji">🌅</span>
                    <span class="sun-label">Sunrise</span>
                    <strong id="sunriseVal">5:30 AM</strong>
                </span>
                <span class="sun-middle">
                    <span class="sun-line"></span>
                    <span class="sun-duration-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <span id="sunDuration">12h 30m</span>
                    </span>
                    <span class="sun-line"></span>
                </span>
                <span class="sun-pill-side">
                    <strong id="sunsetVal">6:02 PM</strong>
                    <span class="sun-label">Sunset</span>
                    <span class="sun-emoji">🌇</span>
                </span>
            </div>

            
            <div class="rain-pill" id="rainPill">
                <span class="rain-icon">🌧️</span>
                <span>Rain Probability: <strong id="rainVal">--</strong></span>
            </div>

           
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-icon">💧</span>
                    <div class="stat-text">
                        <span class="stat-label">Humidity</span>
                        <span id="humidityVal" class="stat-value">68%</span>
                    </div>
                </div>
                <div class="stat-vdivider"></div>
                <div class="stat-item">
                    <span class="stat-icon">💨</span>
                    <div class="stat-text">
                        <span class="stat-label">Wind</span>
                        <span id="windSpeedVal" class="stat-value">14 km/h</span>
                    </div>
                </div>
                <div class="stat-vdivider"></div>
                <div class="stat-item">
                    <span class="stat-icon">🌡️</span>
                    <div class="stat-text">
                        <span class="stat-label">Feels Like</span>
                        <span id="feelsLikeVal" class="stat-value">15°C</span>
                    </div>
                </div>
                <div class="stat-vdivider"></div>
                <div class="stat-item">
                    <span class="stat-icon">🔵</span>
                    <div class="stat-text">
                        <span class="stat-label">Pressure</span>
                        <span id="pressureVal" class="stat-value">1018 hPa</span>
                    </div>
                </div>
            </div>

           
            <div class="card-divider"></div>

        
            <div class="forecast-section">
                <p class="forecast-label">5-DAY FORECAST</p>
                <div id="forecastList" class="forecast-row"></div>
            </div>

        
            <span id="tempHighLow" style="display:none"></span>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
